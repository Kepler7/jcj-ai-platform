services:
  postgres:
    image: postgres:18
    container_name: ihui_postgres
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - ihui_network

  redis:
    image: redis:7
    container_name: ihui_redis
    restart: unless-stopped
    networks:
      - ihui_network

  chroma:
    image: chromadb/chroma:0.6.3
    container_name: ihui_chroma
    restart: unless-stopped
    environment:
      - IS_PERSISTENT=TRUE
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - ihui_network

  backend:
    build:
      context: ./backend
    container_name: ihui_backend
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      - chroma
    volumes:
      - ./data:/app/data
    networks:
      - ihui_network

  worker:
    build:
      context: ./backend
    container_name: ihui_worker
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      - postgres
      - redis
      - chroma
    volumes:
      - ./data:/app/data
    command: sh -lc "PYTHONPATH=/app rq worker jcj"
    networks:
      - ihui_network

  frontend:
    build:
      context: ./frontend
    container_name: ihui_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ihui_network

volumes:
  postgres_data:
  chroma_data:

networks:
  ihui_network:
    driver: bridge
